<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#030712"/>
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e43a15"/>
      <stop offset="100%" stop-color="#9333ea"/>
    </linearGradient>
  </defs>
  <!-- PT letters -->
  <text
    x="32"
    y="42"
    font-family="Arial Black, Arial, sans-serif"
    font-size="26"
    font-weight="900"
    text-anchor="middle"
    fill="white"
    letter-spacing="-1"
  >PT</text>
  <!-- Dot -->
  <circle cx="53" cy="42" r="5" fill="url(#g1)"/>
</svg>
